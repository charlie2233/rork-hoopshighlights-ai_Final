steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hoops-ai/hoops-ai-api:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/hoops-ai/hoops-ai-api:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hoops-ai-api
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/hoops-ai/hoops-ai-api:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --port
      - "8080"
      - --allow-unauthenticated
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/hoops-ai/hoops-ai-api:$COMMIT_SHA
