substitutions:
  _SERVICE_NAME: hoopsclips-inference-staging
  _REGION: us-central1
  _ARTIFACT_REPO: hoopsclips
  _ENVIRONMENT: staging
  _VERSION: phase2b-live-inference-cutover
  _R2_BUCKET_NAME: hoopsclips-uploads-staging
  _R2_ENDPOINT_URL: https://78fb4442e6e37b2c46d7e539c6e79172.r2.cloudflarestorage.com
  _R2_REGION_NAME: auto

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --allow-unauthenticated
      - --service-account
      - hoopsclips-inference@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars
      - >-
        HOOPS_INFERENCE_SERVICE_NAME=${_SERVICE_NAME},
        HOOPS_INFERENCE_ENVIRONMENT=${_ENVIRONMENT},
        HOOPS_INFERENCE_VERSION=${_VERSION},
        HOOPS_INFERENCE_DEFAULT_MODEL=videomae,
        HOOPS_INFERENCE_MODEL_NAME_VIDEOMAE=MCG-NJU/videomae-base-finetuned-kinetics,
        HOOPS_INFERENCE_MODEL_NAME_XCLIP=microsoft/xclip-base-patch32,
        HOOPS_INFERENCE_TEMP_DIR=/tmp/hoops-inference,
        HOOPS_INFERENCE_CALLBACK_TIMEOUT_SECONDS=20,
        HOOPS_INFERENCE_HTTP_TIMEOUT_SECONDS=60,
        HOOPS_INFERENCE_MAX_CANDIDATES=8,
        HOOPS_INFERENCE_RESULT_SCHEMA_VERSION=2026-03-27,
        HOOPS_INFERENCE_HEURISTIC_WINDOW_SECONDS=4.5,
        HOOPS_INFERENCE_HEURISTIC_STRIDE_SECONDS=1.5,
        HOOPS_INFERENCE_FFMPEG_ENABLE_TRANSCODE=true,
        HOOPS_INFERENCE_FFMPEG_VIDEO_PRESET=veryfast,
        HOOPS_INFERENCE_FFMPEG_VIDEO_CRF=28,
        HOOPS_INFERENCE_FFMPEG_MAX_WIDTH=1280,
        HOOPS_INFERENCE_R2_BUCKET_NAME=${_R2_BUCKET_NAME},
        HOOPS_INFERENCE_R2_ENDPOINT_URL=${_R2_ENDPOINT_URL},
        HOOPS_INFERENCE_R2_REGION_NAME=${_R2_REGION_NAME}
      - --set-secrets
      - >-
        HOOPS_INFERENCE_CALLBACK_SECRET=HOOPS_INFERENCE_CALLBACK_SECRET:latest,
        HOOPS_INFERENCE_R2_ACCESS_KEY_ID=HOOPS_INFERENCE_R2_ACCESS_KEY_ID:latest,
        HOOPS_INFERENCE_R2_SECRET_ACCESS_KEY=HOOPS_INFERENCE_R2_SECRET_ACCESS_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
