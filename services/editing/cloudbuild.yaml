substitutions:
  _SERVICE_NAME: hoopclips-editing-staging
  _REGION: us-central1
  _ARTIFACT_REPO: hoopsclips
  _IMAGE_TAG: manual
  _R2_SOURCE_BUCKET: hoopsclips-uploads-staging
  _R2_OUTPUT_BUCKET: hoopsclips-results-staging
  _R2_ENDPOINT_URL: https://78fb4442e6e37b2c46d7e539c6e79172.r2.cloudflarestorage.com
  _AI_EDIT_ENABLED: "true"
  _AI_EDIT_LIVE_RENDER_ENABLED: "true"
  _AI_EDIT_REVISION_ENABLED: "true"
  _AI_EDIT_TEMPLATE_PACK_ENABLED: "true"
  _AI_CLIP_GPT_EDITOR_ENABLED: "true"
  _AI_CLIP_GPT_PLAN_EDIT_ENABLED: "true"
  _AI_CLIP_GPT_REVISION_ENABLED: "true"
  _AI_CLIP_GPT_KEYFRAMES_PER_CLIP: "8"
  _AI_CLIP_GPT_MAX_CANDIDATES_FREE: "8"
  _AI_CLIP_GPT_MAX_CANDIDATES_PRO: "30"
  _AI_CLIP_GPT_TIMEOUT_SECONDS: "60"
  _AI_CLIP_GPT_MAX_OUTPUT_TOKENS: "12000"
  _GPT_HIGHLIGHT_RERANKER_ENABLED: "true"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/editing/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "900"
      - --max-instances
      - "1"
      - --no-cpu-throttling
      - --set-env-vars
      - HOOPS_ENVIRONMENT=staging,HOOPS_RENDER_STORAGE_PROVIDER=r2,HOOPS_R2_BUCKET=${_R2_OUTPUT_BUCKET},HOOPS_R2_SOURCE_BUCKET=${_R2_SOURCE_BUCKET},HOOPS_R2_OUTPUT_BUCKET=${_R2_OUTPUT_BUCKET},HOOPS_R2_ENDPOINT_URL=${_R2_ENDPOINT_URL},HOOPS_GIT_SHA=${_IMAGE_TAG},HOOPS_BACKEND_MODEL_VERSION=editing-cloud-v1,HOOPS_AI_EDIT_ENABLED=${_AI_EDIT_ENABLED},HOOPS_AI_EDIT_LIVE_RENDER_ENABLED=${_AI_EDIT_LIVE_RENDER_ENABLED},HOOPS_AI_EDIT_REVISION_ENABLED=${_AI_EDIT_REVISION_ENABLED},HOOPS_AI_EDIT_TEMPLATE_PACK_ENABLED=${_AI_EDIT_TEMPLATE_PACK_ENABLED},HOOPS_AI_CLIP_GPT_EDITOR_ENABLED=${_AI_CLIP_GPT_EDITOR_ENABLED},HOOPS_AI_CLIP_GPT_PLAN_EDIT_ENABLED=${_AI_CLIP_GPT_PLAN_EDIT_ENABLED},HOOPS_AI_CLIP_GPT_REVISION_ENABLED=${_AI_CLIP_GPT_REVISION_ENABLED},HOOPS_AI_CLIP_GPT_KEYFRAMES_PER_CLIP=${_AI_CLIP_GPT_KEYFRAMES_PER_CLIP},HOOPS_AI_CLIP_GPT_MAX_CANDIDATES_FREE=${_AI_CLIP_GPT_MAX_CANDIDATES_FREE},HOOPS_AI_CLIP_GPT_MAX_CANDIDATES_PRO=${_AI_CLIP_GPT_MAX_CANDIDATES_PRO},HOOPS_AI_CLIP_GPT_TIMEOUT_SECONDS=${_AI_CLIP_GPT_TIMEOUT_SECONDS},HOOPS_AI_CLIP_GPT_MAX_OUTPUT_TOKENS=${_AI_CLIP_GPT_MAX_OUTPUT_TOKENS},HOOPS_GPT_HIGHLIGHT_RERANKER_ENABLED=${_GPT_HIGHLIGHT_RERANKER_ENABLED}
      - --set-secrets
      - HOOPS_EDITING_SERVICE_SECRET=HOOPS_EDITING_SERVICE_SECRET:latest,HOOPS_INTERNAL_PROCESS_SECRET=HOOPS_EDITING_SERVICE_SECRET:latest,HOOPS_R2_ACCESS_KEY_ID=HOOPS_R2_ACCESS_KEY_ID:latest,HOOPS_R2_SECRET_ACCESS_KEY=HOOPS_R2_SECRET_ACCESS_KEY:latest,HOOPS_OPENAI_API_KEY=HOOPS_OPENAI_API_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
