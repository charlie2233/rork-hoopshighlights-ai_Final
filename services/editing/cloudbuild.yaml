substitutions:
  _SERVICE_NAME: hoopclips-editing-staging
  _REGION: us-central1
  _ARTIFACT_REPO: hoopclips
  _R2_BUCKET: hoopclips-renders-staging
  _R2_ENDPOINT_URL: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/editing/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "900"
      - --set-env-vars
      - HOOPS_ENVIRONMENT=staging,HOOPS_RENDER_STORAGE_PROVIDER=r2,HOOPS_R2_BUCKET=${_R2_BUCKET},HOOPS_R2_ENDPOINT_URL=${_R2_ENDPOINT_URL},HOOPS_GIT_SHA=$SHORT_SHA,HOOPS_BACKEND_MODEL_VERSION=editing-cloud-v1
      - --set-secrets
      - HOOPS_EDITING_SERVICE_SECRET=HOOPS_EDITING_SERVICE_SECRET:latest,HOOPS_R2_ACCESS_KEY_ID=HOOPS_R2_ACCESS_KEY_ID:latest,HOOPS_R2_SECRET_ACCESS_KEY=HOOPS_R2_SECRET_ACCESS_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$SHORT_SHA
