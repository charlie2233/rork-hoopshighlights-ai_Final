name: Release Secrets Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Validate production release secrets
    runs-on: macos-26
    environment: production
    env:
      HOOPS_DEVELOPMENT_TEAM: ${{ secrets.HOOPS_DEVELOPMENT_TEAM }}
      HOOPS_REVENUECAT_API_KEY: ${{ secrets.HOOPS_REVENUECAT_API_KEY }}
      HOOPS_GOOGLE_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_CLIENT_ID }}
      HOOPS_GOOGLE_REVERSED_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_REVERSED_CLIENT_ID }}
      HOOPS_PRIVACY_POLICY_URL: ${{ vars.HOOPS_PRIVACY_POLICY_URL }}
      HOOPS_TERMS_OF_SERVICE_URL: ${{ vars.HOOPS_TERMS_OF_SERVICE_URL }}
      HOOPS_SENTRY_DSN: ${{ secrets.HOOPS_SENTRY_DSN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Assert required secrets are present
        run: |
          set -euo pipefail
          required=(
            HOOPS_DEVELOPMENT_TEAM
            HOOPS_REVENUECAT_API_KEY
            HOOPS_GOOGLE_CLIENT_ID
            HOOPS_GOOGLE_REVERSED_CLIENT_ID
            HOOPS_PRIVACY_POLICY_URL
            HOOPS_TERMS_OF_SERVICE_URL
            HOOPS_SENTRY_DSN
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing production secrets: ${missing[*]}"
            exit 1
          fi

      - name: Materialize release secret mirror
        run: ./ios/scripts/materialize_local_secrets.sh

      - name: Verify release build settings
        run: |
          set -euo pipefail

          SETTINGS_FILE="$(mktemp)"
          xcodebuild \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -showBuildSettings > "$SETTINGS_FILE"

          read_setting() {
            local key="$1"
            awk -F' = ' -v wanted="$key" '$1 ~ "^[[:space:]]*" wanted "$" { print $2; found=1; exit } END { if (!found) print "" }' "$SETTINGS_FILE"
          }

          require_non_empty() {
            local key="$1"
            local value
            value="$(read_setting "$key")"
            if [[ -z "$value" ]]; then
              echo "::error::$key resolved empty in Release build settings"
              exit 1
            fi
            echo "$key=present"
          }

          require_exact() {
            local key="$1"
            local expected="$2"
            local value
            value="$(read_setting "$key")"
            if [[ "$value" != "$expected" ]]; then
              echo "::error::$key resolved to '$value', expected '$expected'"
              exit 1
            fi
            echo "$key=expected"
          }

          require_non_empty "DEVELOPMENT_TEAM"
          require_non_empty "HOOPS_REVENUECAT_API_KEY"
          require_non_empty "HOOPS_GOOGLE_CLIENT_ID"
          require_non_empty "HOOPS_GOOGLE_REVERSED_CLIENT_ID"
          require_non_empty "HOOPS_PRIVACY_POLICY_URL"
          require_non_empty "HOOPS_TERMS_OF_SERVICE_URL"
          require_non_empty "HOOPS_SENTRY_DSN"
          require_exact "GENERATE_INFOPLIST_FILE" "NO"
          require_exact "INFOPLIST_FILE" "HoopsClips/App-Info.plist"
          require_exact "HOOPS_CLOUD_LAUNCH_MODE" "disabled"
          require_exact "HOOPS_CLOUD_ANALYSIS_BASE_URL" ""

      - name: Build Release simulator artifact
        run: |
          set -euo pipefail
          rm -rf /tmp/hoops-release-preflight
          xcodebuild \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Release \
            -derivedDataPath /tmp/hoops-release-preflight \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build

      - name: Verify built Info.plist wiring
        run: |
          set -euo pipefail

          APP_PLIST=/tmp/hoops-release-preflight/Build/Products/Release-iphonesimulator/HoopsClips.app/Info.plist
          if [[ ! -f "$APP_PLIST" ]]; then
            echo "::error::Built app Info.plist not found at $APP_PLIST"
            exit 1
          fi

          read_plist() {
            /usr/libexec/PlistBuddy -c "Print :$1" "$APP_PLIST" 2>/dev/null || true
          }

          require_plist_non_empty() {
            local key="$1"
            local value
            value="$(read_plist "$key")"
            [[ -n "$value" ]]
          }

          require_plist_exact() {
            local key="$1"
            local expected="$2"
            local value
            value="$(read_plist "$key")"
            [[ "$value" == "$expected" ]]
          }

          require_plist_non_empty "HOOPSRevenueCatAPIKey"
          require_plist_non_empty "HOOPSGoogleClientID"
          require_plist_non_empty "HOOPSGoogleReversedClientID"
          require_plist_non_empty "HOOPSPrivacyPolicyURL"
          require_plist_non_empty "HOOPSTermsOfServiceURL"
          require_plist_non_empty "HOOPSSentryDSN"
          require_plist_non_empty "CFBundleURLTypes:0:CFBundleURLSchemes:0"
          require_plist_exact "HOOPSCloudLaunchMode" "disabled"
          require_plist_exact "HOOPSCloudAnalysisBaseURL" ""

          echo "Release signing, Google, billing, telemetry, cloud-disabled posture, and built Info.plist wiring verified."
