name: iOS Internal TestFlight Upload

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      operation:
        description: "Internal TestFlight operation to run."
        required: true
        default: codecheck
        type: choice
        options:
          - codecheck
          - preflight
          - archive
          - upload

permissions:
  contents: read

jobs:
  internal-staging-codecheck:
    name: No-secret internal staging codecheck
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.operation == 'codecheck')
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Verify internal staging build settings without signing
        run: bash ios/scripts/verify_internal_staging_config.sh

      - name: Validate internal TestFlight export options
        run: plutil -lint ios/exportOptions.testflight-internal.plist

      - name: Build Debug tests without signing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/hoopclips-codecheck-derived" \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation

      - name: Print codecheck summary
        run: |
          set -euo pipefail
          cat <<'SUMMARY'
          No-secret codecheck completed.
          This proves internal staging build settings, export-options syntax, and unsigned Debug test compilation only.
          It does not create a signed archive, upload to App Store Connect, or prove installed TestFlight smoke.
          SUMMARY

  internal-testflight:
    name: Build internal staging TestFlight archive
    if: github.event_name == 'workflow_dispatch' && inputs.operation != 'codecheck'
    runs-on: macos-26
    environment: staging
    env:
      OPERATION: ${{ inputs.operation }}
      HOOPS_DEVELOPMENT_TEAM: ${{ secrets.HOOPS_DEVELOPMENT_TEAM }}
      HOOPS_REVENUECAT_API_KEY: ${{ secrets.HOOPS_REVENUECAT_API_KEY }}
      HOOPS_GOOGLE_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_CLIENT_ID }}
      HOOPS_GOOGLE_REVERSED_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_REVERSED_CLIENT_ID }}
      HOOPS_FIREBASE_AUTH_API_KEY: ${{ secrets.HOOPS_FIREBASE_AUTH_API_KEY }}
      HOOPS_PRIVACY_POLICY_URL: ${{ vars.HOOPS_PRIVACY_POLICY_URL }}
      HOOPS_TERMS_OF_SERVICE_URL: ${{ vars.HOOPS_TERMS_OF_SERVICE_URL }}
      HOOPS_SENTRY_DSN: ${{ secrets.HOOPS_SENTRY_DSN }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Set temporary build paths
        run: |
          set -euo pipefail
          {
            echo "ARCHIVE_PATH=$RUNNER_TEMP/HoopsClips-InternalStaging.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/HoopsClips-TestFlight-Export"
            echo "DERIVED_DATA_PATH=$RUNNER_TEMP/hoopclips-internal-staging-derived"
          } >> "$GITHUB_ENV"

      - name: Assert required inputs are present
        run: |
          set -euo pipefail
          required=(
            HOOPS_DEVELOPMENT_TEAM
            HOOPS_REVENUECAT_API_KEY
            HOOPS_GOOGLE_CLIENT_ID
            HOOPS_GOOGLE_REVERSED_CLIENT_ID
            HOOPS_FIREBASE_AUTH_API_KEY
            HOOPS_PRIVACY_POLICY_URL
            HOOPS_TERMS_OF_SERVICE_URL
            HOOPS_SENTRY_DSN
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing internal TestFlight inputs: ${missing[*]}"
            exit 1
          fi

      - name: Materialize release secret mirror
        run: ./ios/scripts/materialize_local_secrets.sh

      - name: Verify internal staging build settings
        run: bash ios/scripts/verify_internal_staging_config.sh

      - name: Materialize App Store Connect API key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          ASC_KEY_PATH="$key_path" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["ASC_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_BASE64"]))
          PY
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "App Store Connect API key materialized"

      - name: Build signed internal staging archive
        run: |
          set -euo pipefail
          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"
          xcodebuild archive \
            -quiet \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -xcconfig ios/HoopsClips/HoopsClips/Config/InternalStaging.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$HOOPS_DEVELOPMENT_TEAM" \
            -hideShellScriptEnvironment
          echo "Archive created"

      - name: Verify archive metadata
        run: |
          set -euo pipefail
          archive_plist="$ARCHIVE_PATH/Info.plist"
          app_plist="$ARCHIVE_PATH/Products/Applications/HoopsClips.app/Info.plist"

          require_archive_value() {
            local key="$1"
            local expected="$2"
            local value
            value="$(/usr/libexec/PlistBuddy -c "Print :ApplicationProperties:$key" "$archive_plist")"
            if [[ "$value" != "$expected" ]]; then
              echo "::error::Archive $key resolved to '$value', expected '$expected'"
              exit 1
            fi
            echo "$key=expected"
          }

          require_app_value() {
            local key="$1"
            local expected="$2"
            local value
            value="$(/usr/libexec/PlistBuddy -c "Print :$key" "$app_plist")"
            if [[ "$value" != "$expected" ]]; then
              echo "::error::App $key resolved to '$value', expected '$expected'"
              exit 1
            fi
            echo "$key=expected"
          }

          require_archive_value "CFBundleIdentifier" "atrak.charlie.hoopsclips"
          require_archive_value "CFBundleShortVersionString" "1.0.0"
          require_archive_value "CFBundleVersion" "15"
          require_app_value "HOOPSAppEnvironment" "internal_staging"
          require_app_value "HOOPSCloudLaunchMode" "internal_only"
          require_app_value "HOOPSCloudAnalysisBaseURL" "https://hoopsclips-control-plane-staging.charliehan-lifepage.workers.dev"
          require_app_value "HOOPSCloudEditBaseURL" "https://hoopsclips-control-plane-staging.charliehan-lifepage.workers.dev"

      - name: Upload to internal TestFlight
        if: inputs.operation == 'upload'
        run: |
          set -euo pipefail
          rm -rf "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/exportOptions.testflight-internal.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -hideShellScriptEnvironment
          echo "Internal TestFlight upload command completed"

      - name: Print next-step summary
        run: |
          set -euo pipefail
          if [[ "$OPERATION" == "upload" ]]; then
            echo "Upload operation completed; verify App Store Connect processing and then run the installed TestFlight smoke."
          else
            echo "Archive/preflight operation completed; no App Store Connect upload was attempted."
          fi

      - name: Remove App Store Connect API key
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${ASC_KEY_PATH:-}" ]]; then
            rm -f "$ASC_KEY_PATH"
          fi
