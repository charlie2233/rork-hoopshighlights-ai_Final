name: iOS Internal TestFlight Upload

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      operation:
        description: "Internal TestFlight operation to run."
        required: true
        default: codecheck
        type: choice
        options:
          - codecheck
          - status
          - preflight
          - archive
          - upload

permissions:
  contents: read

jobs:
  internal-staging-codecheck:
    name: No-secret internal staging codecheck
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.operation == 'codecheck')
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Verify internal staging build settings without signing
        run: bash ios/scripts/verify_internal_staging_config.sh

      - name: Validate internal TestFlight export options
        run: |
          plutil -lint ios/exportOptions.testflight-internal.plist
          plutil -lint ios/HoopsClips/HoopsClips/PrivacyInfo.xcprivacy

      - name: Run focused Debug simulator tests without signing
        timeout-minutes: 20
        run: |
          set -euo pipefail
          result_bundle="$RUNNER_TEMP/hoopclips-focused-tests.xcresult"
          xcodebuild test \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -destination-timeout 120 \
            -derivedDataPath "$RUNNER_TEMP/hoopclips-codecheck-derived" \
            -resultBundlePath "$result_bundle" \
            -only-testing:HoopsClipsTests/AuthServiceTests \
            -only-testing:HoopsClipsTests/LaunchTelemetryTests \
            -only-testing:HoopsClipsTests/UploadThroughputPolicyTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation

          xcrun xcresulttool get test-results summary --path "$result_bundle" \
            | jq -e '.totalTestCount == 14 and .passedTests == 14 and .failedTests == 0 and .skippedTests == 0'

      - name: Print codecheck summary
        run: |
          set -euo pipefail
          cat <<'SUMMARY'
          No-secret codecheck completed.
          This proves internal staging build settings, export-options syntax, and fourteen focused unsigned Debug simulator tests.
          It does not create a signed archive, upload to App Store Connect, or prove installed TestFlight smoke.
          SUMMARY

  internal-testflight:
    name: Build internal staging TestFlight archive
    if: github.event_name == 'workflow_dispatch' && (inputs.operation == 'preflight' || inputs.operation == 'archive' || inputs.operation == 'upload')
    runs-on: macos-26
    environment: staging
    concurrency:
      group: hoopclips-ios-automatic-signing
      cancel-in-progress: false
    env:
      OPERATION: ${{ inputs.operation }}
      HOOPS_DEVELOPMENT_TEAM: ${{ secrets.HOOPS_DEVELOPMENT_TEAM }}
      HOOPS_REVENUECAT_API_KEY: ${{ secrets.HOOPS_REVENUECAT_API_KEY }}
      HOOPS_GOOGLE_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_CLIENT_ID }}
      HOOPS_GOOGLE_REVERSED_CLIENT_ID: ${{ secrets.HOOPS_GOOGLE_REVERSED_CLIENT_ID }}
      HOOPS_FIREBASE_AUTH_API_KEY: ${{ secrets.HOOPS_FIREBASE_AUTH_API_KEY }}
      HOOPS_PRIVACY_POLICY_URL: ${{ vars.HOOPS_PRIVACY_POLICY_URL }}
      HOOPS_TERMS_OF_SERVICE_URL: ${{ vars.HOOPS_TERMS_OF_SERVICE_URL }}
      HOOPS_SENTRY_DSN: ${{ secrets.HOOPS_SENTRY_DSN }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Set temporary build paths
        run: |
          set -euo pipefail
          {
            echo "ARCHIVE_PATH=$RUNNER_TEMP/HoopsClips-InternalStaging.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/HoopsClips-TestFlight-Export"
            echo "DERIVED_DATA_PATH=$RUNNER_TEMP/hoopclips-internal-staging-derived"
          } >> "$GITHUB_ENV"

      - name: Assert required inputs are present
        run: |
          set -euo pipefail
          required=(
            HOOPS_DEVELOPMENT_TEAM
            HOOPS_REVENUECAT_API_KEY
            HOOPS_GOOGLE_CLIENT_ID
            HOOPS_GOOGLE_REVERSED_CLIENT_ID
            HOOPS_FIREBASE_AUTH_API_KEY
            HOOPS_PRIVACY_POLICY_URL
            HOOPS_TERMS_OF_SERVICE_URL
            HOOPS_SENTRY_DSN
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing internal TestFlight inputs: ${missing[*]}"
            exit 1
          fi

          if [[ "$HOOPS_REVENUECAT_API_KEY" == test_* ]]; then
            echo "::error::HOOPS_REVENUECAT_API_KEY must be the Apple production public SDK key, not a RevenueCat Test Store key"
            exit 1
          fi

      - name: Materialize release secret mirror
        run: ./ios/scripts/materialize_local_secrets.sh

      - name: Verify internal staging build settings
        run: bash ios/scripts/verify_internal_staging_config.sh

      - name: Materialize App Store Connect API key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          ASC_KEY_PATH="$key_path" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["ASC_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_BASE64"]))
          PY
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "App Store Connect API key materialized"

      - name: Verify automatic signing certificate capacity
        run: |
          set -euo pipefail
          snapshot_path="$RUNNER_TEMP/app-store-connect-certificates-before.json"
          python3 scripts/app_store_connect_certificates.py snapshot \
            --key-path "$ASC_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --output "$snapshot_path"
          echo "ASC_CERTIFICATE_SNAPSHOT=$snapshot_path" >> "$GITHUB_ENV"

      - name: Build signed internal staging archive
        run: |
          set -euo pipefail
          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"
          xcodebuild archive \
            -quiet \
            -project ios/HoopsClips.xcodeproj \
            -scheme HoopsClips \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -xcconfig ios/HoopsClips/HoopsClips/Config/InternalStaging.xcconfig \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$HOOPS_DEVELOPMENT_TEAM" \
            -hideShellScriptEnvironment
          echo "Archive created"

      - name: Verify archive metadata
        run: |
          set -euo pipefail
          archive_plist="$ARCHIVE_PATH/Info.plist"
          app_plist="$ARCHIVE_PATH/Products/Applications/HoopsClips.app/Info.plist"
          privacy_manifest="$ARCHIVE_PATH/Products/Applications/HoopsClips.app/PrivacyInfo.xcprivacy"

          require_archive_value() {
            local key="$1"
            local expected="$2"
            local value
            value="$(/usr/libexec/PlistBuddy -c "Print :ApplicationProperties:$key" "$archive_plist")"
            if [[ "$value" != "$expected" ]]; then
              echo "::error::Archive $key resolved to '$value', expected '$expected'"
              exit 1
            fi
            echo "$key=expected"
          }

          require_app_value() {
            local key="$1"
            local expected="$2"
            local value
            value="$(/usr/libexec/PlistBuddy -c "Print :$key" "$app_plist")"
            if [[ "$value" != "$expected" ]]; then
              echo "::error::App $key resolved to '$value', expected '$expected'"
              exit 1
            fi
            echo "$key=expected"
          }

          require_archive_value "CFBundleIdentifier" "atrak.charlie.hoopsclips"
          require_archive_value "CFBundleShortVersionString" "1.0.0"
          require_archive_value "CFBundleVersion" "54"
          require_app_value "HOOPSAppEnvironment" "internal_staging"
          require_app_value "HOOPSCloudLaunchMode" "internal_only"
          require_app_value "HOOPSCloudAnalysisBaseURL" "https://hoopsclips-control-plane-staging.charliehan-lifepage.workers.dev"
          require_app_value "HOOPSCloudEditBaseURL" "https://hoopsclips-control-plane-staging.charliehan-lifepage.workers.dev"

          billing_public_value="$(/usr/libexec/PlistBuddy -c 'Print :HOOPSRevenueCatAPIKey' "$app_plist")"
          if [[ -z "$billing_public_value" || "$billing_public_value" == test_* ]]; then
            echo "::error::Archive must contain a non-Test-Store RevenueCat Apple public SDK key"
            exit 1
          fi
          echo "RevenueCat Apple public SDK key is production-compatible"

          if [[ ! -f "$privacy_manifest" ]]; then
            echo "::error::Archive is missing HoopsClips.app/PrivacyInfo.xcprivacy"
            exit 1
          fi
          plutil -lint "$privacy_manifest"
          echo "PrivacyInfo.xcprivacy=present-and-valid"

      - name: Capture archive signing certificate serial
        run: |
          set -euo pipefail
          certificate_dir="$RUNNER_TEMP/archive-signing-certificate"
          app_path="$ARCHIVE_PATH/Products/Applications/HoopsClips.app"
          rm -rf "$certificate_dir"
          mkdir -p "$certificate_dir"
          (
            cd "$certificate_dir"
            codesign -d --extract-certificates "$app_path"
          )
          certificate_serial="$(openssl x509 -inform DER -in "$certificate_dir/codesign0" -noout -serial | sed -E 's/^serial=//I')"
          if [[ -z "$certificate_serial" ]]; then
            echo "::error::Could not read the archive signing certificate serial."
            exit 1
          fi
          echo "ASC_ARCHIVE_CERTIFICATE_SERIAL=$certificate_serial" >> "$GITHUB_ENV"
          echo "Archive signing certificate serial captured"

      - name: Upload to internal TestFlight
        if: inputs.operation == 'upload'
        run: |
          set -euo pipefail
          rm -rf "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/exportOptions.testflight-internal.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -hideShellScriptEnvironment
          echo "Internal TestFlight upload command completed"

      - name: Print next-step summary
        run: |
          set -euo pipefail
          if [[ "$OPERATION" == "upload" ]]; then
            echo "Upload operation completed; verify App Store Connect processing and then run the installed TestFlight smoke."
          else
            echo "Archive/preflight operation completed; no App Store Connect upload was attempted."
          fi

      - name: Revoke this runner's automatic signing certificate
        if: always()
        run: |
          set -euo pipefail
          if [[ -z "${ASC_KEY_PATH:-}" || ! -f "$ASC_KEY_PATH" ]]; then
            echo "App Store Connect API key is unavailable; certificate cleanup skipped."
            exit 0
          fi
          if [[ -z "${ASC_CERTIFICATE_SNAPSHOT:-}" || ! -f "$ASC_CERTIFICATE_SNAPSHOT" ]]; then
            echo "Certificate snapshot is unavailable; certificate cleanup skipped."
            exit 0
          fi
          cleanup_args=(
            cleanup
            --key-path "$ASC_KEY_PATH"
            --key-id "$APP_STORE_CONNECT_KEY_ID"
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
            --snapshot "$ASC_CERTIFICATE_SNAPSHOT"
          )
          if [[ -n "${ASC_ARCHIVE_CERTIFICATE_SERIAL:-}" ]]; then
            cleanup_args+=(--certificate-serial "$ASC_ARCHIVE_CERTIFICATE_SERIAL")
          fi
          python3 scripts/app_store_connect_certificates.py "${cleanup_args[@]}"

      - name: Remove App Store Connect API key
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${ASC_KEY_PATH:-}" ]]; then
            rm -f "$ASC_KEY_PATH"
          fi

  app-store-connect-status:
    name: Verify build 54 internal TestFlight status
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'status'
    runs-on: ubuntu-latest
    environment: staging
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Assert App Store Connect inputs are present
        run: |
          set -euo pipefail
          required=(
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
          )
          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing App Store Connect inputs: ${missing[*]}"
            exit 1
          fi

      - name: Materialize App Store Connect API key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          ASC_KEY_PATH="$key_path" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["ASC_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_BASE64"]))
          PY
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "App Store Connect API key materialized"

      - name: Wait for build 54 internal TestFlight availability
        run: |
          set -euo pipefail
          status_path="$RUNNER_TEMP/app-store-connect-build-54-status.json"
          python3 scripts/app_store_connect_build_status.py \
            --key-path "$ASC_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --bundle-id atrak.charlie.hoopsclips \
            --marketing-version 1.0.0 \
            --build-version 54 \
            --wait-seconds 900 \
            --poll-seconds 30 \
            --output "$status_path"
          echo "ASC_BUILD_STATUS_PATH=$status_path" >> "$GITHUB_ENV"

      - name: Publish non-secret build status summary
        run: |
          set -euo pipefail
          {
            echo "### App Store Connect build 54"
            echo
            echo '```json'
            jq . "$ASC_BUILD_STATUS_PATH"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload non-secret build status proof
        uses: actions/upload-artifact@v4
        with:
          name: app-store-connect-build-54-status
          path: ${{ env.ASC_BUILD_STATUS_PATH }}
          retention-days: 14

      - name: Remove App Store Connect API key
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${ASC_KEY_PATH:-}" ]]; then
            rm -f "$ASC_KEY_PATH"
          fi
