name: Cloud Edit Deploy Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-preflight:
    name: Verify cloud edit deploy secrets
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Assert cloud deploy inputs are present
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_API_TOKEN
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
            GCP_PROJECT_ID
            GCP_REGION
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing cloud edit deploy inputs: ${missing[*]}"
            exit 1
          fi

      - name: Print CI credential scope checklist
        run: |
          set -euo pipefail
          cat <<'CHECKLIST'
          CLOUDFLARE_API_TOKEN requirements:
            - Store as GitHub Actions environment secret: staging / CLOUDFLARE_API_TOKEN
            - Scope to the HoopClips Cloudflare account
            - Workers Scripts: Edit
            - Account Settings: Read
            - D1: Edit, when running migrations
            - R2: Edit, when deploy preflight verifies bucket bindings or artifacts
            - Rotate from Cloudflare dashboard and update the GitHub environment secret

          GCP deploy identity requirements:
            - Workload Identity Provider configured in GCP_WORKLOAD_IDENTITY_PROVIDER
            - Deploy service account configured in GCP_DEPLOY_SERVICE_ACCOUNT
            - Cloud Run Admin
            - Artifact Registry Writer
            - Cloud Build submit permissions
            - Secret Manager Secret Accessor for deploy-time checks
            - Service Account User for the Cloud Run runtime service account, if required
          CHECKLIST

      - name: Print deploy command checklist
        run: |
          set -euo pipefail
          cat <<'CHECKLIST'
          Staging Worker deploy:
            cd services/control-plane
            npx wrangler deploy --env staging

          Staging editing service deploy:
            gcloud builds submit . \
              --project="$GCP_PROJECT_ID" \
              --config=services/editing/cloudbuild.yaml \
              --substitutions=_IMAGE_TAG="$GITHUB_SHA"

          Cloud Run rollback:
            gcloud run services update-traffic hoopclips-editing-staging \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --to-revisions <previous-revision>=100

          Worker rollback:
            cd services/control-plane
            npx wrangler rollback --env staging
          CHECKLIST
