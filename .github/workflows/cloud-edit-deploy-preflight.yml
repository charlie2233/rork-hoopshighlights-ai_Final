name: Cloud Edit Deploy Preflight

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      operation:
        description: "Staging operation to run after preflight."
        required: true
        default: codecheck
        type: choice
        options:
          - codecheck
          - credential-check
          - preflight
          - deploy
          - rollback
      rollback_version_id:
        description: "Required only when operation=rollback. Worker version ID to roll back to."
        required: false
        type: string
      cloud_run_revision:
        description: "Required only when operation=rollback. Cloud Run editing revision to receive 100% traffic."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  worker-dry-run:
    name: Worker typecheck and dry run
    if: github.event_name != 'workflow_dispatch' || inputs.operation != 'credential-check'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install control-plane dependencies
        run: npm --prefix services/control-plane ci

      - name: Typecheck control plane
        run: npm --prefix services/control-plane run typecheck

      - name: Test control plane routing
        run: npm --prefix services/control-plane test

      - name: Validate staging Worker bundle and bindings
        run: npm --prefix services/control-plane run deploy:staging:dry-run

  editing-backend-codecheck:
    name: Editing backend Python tests
    if: github.event_name != 'workflow_dispatch' || inputs.operation != 'credential-check'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r services/editing/requirements.txt
          python -m pip install -r ios/backend/requirements.txt

      - name: Compile backend modules
        run: |
          set -euo pipefail
          python -m py_compile \
            ios/backend/app/editing.py \
            ios/backend/app/main.py \
            services/editing/editing_app/gpt_reranker.py \
            services/editing/editing_app/main.py

      - name: Run backend tests
        run: |
          set -euo pipefail
          PYTHONPATH=ios/backend:services/editing python -m unittest discover ios/backend/tests -v
          PYTHONPATH=ios/backend:services/editing python -m unittest discover services/editing/tests -v

      - name: Run launch script tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

  deploy-credential-check:
    name: Verify cloud deploy credentials only
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'credential-check'
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      EDITING_SERVICE_NAME: hoopclips-editing-staging

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install control-plane dependencies
        run: npm --prefix services/control-plane ci

      - name: Assert cloud deploy inputs are present
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_API_TOKEN
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
            GCP_PROJECT_ID
            GCP_REGION
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing cloud edit deploy inputs: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify editing deploy credential preflight
        run: |
          set -euo pipefail
          if ! python3 services/editing/scripts/deploy_preflight.py \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --require-cloud-run-service \
            --json >/tmp/editing-deploy-preflight.json; then
            cat /tmp/editing-deploy-preflight.json
            exit 1
          fi
          echo "credential-only deploy preflight succeeded"

  deploy-preflight:
    name: Verify cloud edit deploy secrets
    needs:
      - worker-dry-run
      - editing-backend-codecheck
    if: github.event_name == 'workflow_dispatch' && inputs.operation != 'codecheck' && inputs.operation != 'credential-check'
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      DEPLOY_OPERATION: ${{ inputs.operation }}
      ROLLBACK_VERSION_ID: ${{ inputs.rollback_version_id }}
      CLOUD_RUN_ROLLBACK_REVISION: ${{ inputs.cloud_run_revision }}
      EDITING_SERVICE_NAME: hoopclips-editing-staging
      WORKER_EDITING_VERSION_URL: https://hoopsclips-control-plane-staging.charliehan-lifepage.workers.dev/v1/editing/version

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install control-plane dependencies
        run: npm --prefix services/control-plane ci

      - name: Assert cloud deploy inputs are present
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_API_TOKEN
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
            GCP_PROJECT_ID
            GCP_REGION
          )

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            else
              echo "$key=present"
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing cloud edit deploy inputs: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify editing deploy preflight
        run: |
          set -euo pipefail
          if ! python3 services/editing/scripts/deploy_preflight.py \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --require-cloud-run-service \
            --json >/tmp/editing-deploy-preflight.json; then
            cat /tmp/editing-deploy-preflight.json
            exit 1
          fi
          echo "editing deploy preflight succeeded"

      - name: Verify Wrangler token authentication
        working-directory: services/control-plane
        run: |
          set -euo pipefail
          npx wrangler whoami --json >/tmp/wrangler-whoami.json
          echo "wrangler whoami authenticated"

      - name: Verify staging Worker secret names
        working-directory: services/control-plane
        run: |
          set -euo pipefail
          npx wrangler secret list --env staging --format json >/tmp/wrangler-secrets.json
          required=(
            ADMIN_API_TOKEN
            CONTROL_PLANE_BASE_URL
            CONTROL_PLANE_SHARED_SECRET
            INFERENCE_BASE_URL
            INFERENCE_SHARED_SECRET
            EDITING_BASE_URL
            EDITING_SHARED_SECRET
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
          )
          missing=()
          for key in "${required[@]}"; do
            if jq -e --arg key "$key" 'any(.[]; .name == $key)' /tmp/wrangler-secrets.json >/dev/null; then
              echo "$key=present"
            else
              missing+=("$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing staging Worker secrets: ${missing[*]}"
            exit 1
          fi

      - name: Verify staging deployment read scope
        working-directory: services/control-plane
        run: |
          set -euo pipefail
          npx wrangler deployments list --env staging --json >/tmp/wrangler-deployments.json
          echo "wrangler deployments list succeeded"

      - name: Verify staging deploy dry run with CI token
        run: npm --prefix services/control-plane run deploy:staging:dry-run

      - name: Deploy staging editing service
        if: inputs.operation == 'deploy'
        run: |
          set -euo pipefail
          image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/hoopsclips/${EDITING_SERVICE_NAME}:${GITHUB_SHA}"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build \
            -f services/editing/Dockerfile \
            -t "$image" \
            .
          docker push "$image"
          gcloud run deploy "$EDITING_SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --image="$image" \
            --region="$GCP_REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=2Gi \
            --cpu=2 \
            --timeout=900 \
            --max-instances=1 \
            --no-cpu-throttling \
            --set-env-vars="HOOPS_ENVIRONMENT=staging,HOOPS_RENDER_STORAGE_PROVIDER=r2,HOOPS_R2_BUCKET=hoopsclips-results-staging,HOOPS_R2_SOURCE_BUCKET=hoopsclips-uploads-staging,HOOPS_R2_OUTPUT_BUCKET=hoopsclips-results-staging,HOOPS_R2_ENDPOINT_URL=https://78fb4442e6e37b2c46d7e539c6e79172.r2.cloudflarestorage.com,HOOPS_GIT_SHA=${GITHUB_SHA},HOOPS_BACKEND_MODEL_VERSION=editing-cloud-v1,HOOPS_AI_EDIT_ENABLED=true,HOOPS_AI_EDIT_LIVE_RENDER_ENABLED=true,HOOPS_AI_EDIT_REVISION_ENABLED=true,HOOPS_AI_EDIT_TEMPLATE_PACK_ENABLED=true,HOOPS_AI_CLIP_GPT_EDITOR_ENABLED=true,HOOPS_AI_CLIP_GPT_PLAN_EDIT_ENABLED=true,HOOPS_AI_CLIP_GPT_REVISION_ENABLED=true,HOOPS_AI_CLIP_GPT_KEYFRAMES_PER_CLIP=10,HOOPS_AI_CLIP_GPT_MAX_CANDIDATES_FREE=220,HOOPS_AI_CLIP_GPT_MAX_CANDIDATES_PRO=220,HOOPS_AI_CLIP_GPT_TIMEOUT_SECONDS=120,HOOPS_AI_CLIP_GPT_MAX_OUTPUT_TOKENS=24000,HOOPS_GPT_HIGHLIGHT_RERANKER_ENABLED=true" \
            --set-secrets="HOOPS_EDITING_SERVICE_SECRET=HOOPS_EDITING_SERVICE_SECRET:latest,HOOPS_INTERNAL_PROCESS_SECRET=HOOPS_EDITING_SERVICE_SECRET:latest,HOOPS_R2_ACCESS_KEY_ID=HOOPS_R2_ACCESS_KEY_ID:latest,HOOPS_R2_SECRET_ACCESS_KEY=HOOPS_R2_SECRET_ACCESS_KEY:latest,HOOPS_OPENAI_API_KEY=HOOPS_OPENAI_API_KEY:latest"

      - name: Verify direct editing version after deploy
        if: inputs.operation == 'deploy'
        run: |
          set -euo pipefail
          editing_url="$(
            gcloud run services describe "$EDITING_SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format='value(status.url)'
          )"
          if [[ -z "$editing_url" ]]; then
            echo "::error::Cloud Run did not return an editing service URL"
            exit 1
          fi
          curl --fail --silent --show-error "$editing_url/version" >/tmp/editing-version.json
          jq -e --arg sha "$GITHUB_SHA" '
            .gitSha == $sha
            and .backendModelVersion == "editing-cloud-v1"
            and .featureFlags.aiEditEnabled == true
            and .featureFlags.aiEditLiveRenderEnabled == true
            and .featureFlags.aiEditRevisionEnabled == true
            and .featureFlags.aiEditTemplatePackEnabled == true
            and .featureFlags.aiClipGptEditorEnabled == true
            and .featureFlags.aiClipGptPlanEditEnabled == true
            and .featureFlags.aiClipGptRevisionEnabled == true
            and .featureFlags.gptHighlightRerankerEnabled == true
            and .gptHighlightReranker.enabled == true
            and .gptHighlightReranker.configured == true
          ' /tmp/editing-version.json >/dev/null
          echo "direct editing /version matches current deploy and required AI Edit/GPT flags"

      - name: Deploy staging Worker
        if: inputs.operation == 'deploy'
        working-directory: services/control-plane
        run: |
          set -euo pipefail
          npx wrangler deploy \
            --env staging \
            --keep-vars \
            --message "GitHub Actions staging deploy ${GITHUB_SHA}"
          npx wrangler deployments status --env staging

      - name: Verify Worker editing version after deploy
        if: inputs.operation == 'deploy'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$WORKER_EDITING_VERSION_URL" >/tmp/worker-editing-version.json
          jq -e --arg sha "$GITHUB_SHA" '
            .gitSha == $sha
            and .backendModelVersion == "editing-cloud-v1"
            and .featureFlags.aiEditEnabled == true
            and .featureFlags.aiEditLiveRenderEnabled == true
            and .featureFlags.aiEditRevisionEnabled == true
            and .featureFlags.aiEditTemplatePackEnabled == true
            and .featureFlags.aiClipGptEditorEnabled == true
            and .featureFlags.aiClipGptPlanEditEnabled == true
            and .featureFlags.aiClipGptRevisionEnabled == true
            and .featureFlags.gptHighlightRerankerEnabled == true
            and .gptHighlightReranker.enabled == true
            and .gptHighlightReranker.configured == true
          ' /tmp/worker-editing-version.json >/dev/null
          echo "Worker /v1/editing/version matches current deploy and required AI Edit/GPT flags"

      - name: Roll back staging editing service
        if: inputs.operation == 'rollback'
        run: |
          set -euo pipefail
          if [[ -z "${CLOUD_RUN_ROLLBACK_REVISION:-}" ]]; then
            echo "::error::cloud_run_revision is required when operation=rollback"
            exit 1
          fi
          gcloud run services update-traffic "$EDITING_SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --to-revisions "${CLOUD_RUN_ROLLBACK_REVISION}=100"
          gcloud run services describe "$EDITING_SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.traffic)'

      - name: Roll back staging Worker
        if: inputs.operation == 'rollback'
        working-directory: services/control-plane
        run: |
          set -euo pipefail
          if [[ -z "${ROLLBACK_VERSION_ID:-}" ]]; then
            echo "::error::rollback_version_id is required when operation=rollback"
            exit 1
          fi
          npx wrangler rollback "${ROLLBACK_VERSION_ID}" \
            --env staging \
            --yes \
            --message "GitHub Actions staging rollback ${GITHUB_SHA}"
          npx wrangler deployments status --env staging

      - name: Print CI credential scope checklist
        run: |
          set -euo pipefail
          cat <<'CHECKLIST'
          CLOUDFLARE_API_TOKEN requirements:
            - Store as GitHub Actions environment secret: staging / CLOUDFLARE_API_TOKEN
            - Scope to HoopClips Cloudflare account ID 78fb4442e6e37b2c46d7e539c6e79172
            - Token name: HoopClips staging CI deploy
            - TTL: start on creation date, end 90 days later for internal beta rotation
            - Account resources: only the account that owns Worker hoopsclips-control-plane-staging and staging R2 buckets
            - Zone resources: no zone permission is needed for the workers.dev staging route; if the dashboard requires a zone choice, use All zones only as a form-required fallback and do not add DNS Edit
            - Workers Scripts: Edit
            - Account Settings: Read
            - Workers Tail: Read, optional for log streaming smoke
            - D1: Edit, when running migrations
            - Workers R2 Storage: Edit, when deploy preflight verifies bucket bindings or artifacts
            - Rotate from Cloudflare dashboard and update the GitHub environment secret

          GCP deploy identity requirements:
            - Workload Identity Provider configured in GCP_WORKLOAD_IDENTITY_PROVIDER
            - Deploy service account configured in GCP_DEPLOY_SERVICE_ACCOUNT
            - Cloud Run Admin
            - Artifact Registry Writer
            - Secret Manager Secret Accessor for deploy/runtime secret payload access
            - Secret Manager Viewer for deploy-time metadata and latest-version state checks
            - Service Account User for the Cloud Run runtime service account, if required
          CHECKLIST

      - name: Print deploy command checklist
        run: |
          set -euo pipefail
          deploy_ref="${GITHUB_REF_NAME:-main}"
          cat <<CHECKLIST
          Staging Worker deploy:
            cd services/control-plane
            npx wrangler deploy --env staging --keep-vars --message "staging deploy <git-sha>"

          Staging editing service deploy:
            gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
            docker build -f services/editing/Dockerfile -t "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/hoopsclips/hoopclips-editing-staging:$GITHUB_SHA" .
            docker push "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/hoopsclips/hoopclips-editing-staging:$GITHUB_SHA"
            gcloud run deploy hoopclips-editing-staging \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --image="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/hoopsclips/hoopclips-editing-staging:$GITHUB_SHA"

          Cloud Run rollback:
            gcloud run services update-traffic hoopclips-editing-staging \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --to-revisions <previous-revision>=100

          GitHub Actions staging credential check:
            gh workflow run "Cloud Edit Deploy Preflight" \
              --ref ${deploy_ref} \
              -f operation=credential-check

          GitHub Actions staging full preflight:
            gh workflow run "Cloud Edit Deploy Preflight" \
              --ref ${deploy_ref} \
              -f operation=preflight

          GitHub Actions staging deploy:
            gh workflow run "Cloud Edit Deploy Preflight" \
              --ref ${deploy_ref} \
              -f operation=deploy

          GitHub Actions staging rollback:
            gh workflow run "Cloud Edit Deploy Preflight" \
              --ref ${deploy_ref} \
              -f operation=rollback \
              -f cloud_run_revision=<previous-cloud-run-revision> \
              -f rollback_version_id=<previous-worker-version-id>

          Worker rollback:
            cd services/control-plane
            npx wrangler deployments list --env staging
            npx wrangler rollback <version-id> --env staging --yes --message "rollback <git-sha>"
          CHECKLIST
